name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    # Fired by pluggy-sh/pluggy after a release tag is published.
    types: [pluggy-release]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run sync
      - run: bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist/
          retention-days: 7
